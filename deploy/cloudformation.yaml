AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Infrastructure Stack for MindEase - AI Mental Wellness Tracker.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]
    Description: Environment name for resource tagging and prefixing.

  TablePrefix:
    Type: String
    Default: mindease
    Description: Prefix for the main DynamoDB table.

Resources:
  # ─────────────────────────────────────────────────────────────────────────────
  # DynamoDB Single Table
  # ─────────────────────────────────────────────────────────────────────────────
  DynamoDBMainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}-main"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1-email-index
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2-owner-date-index
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: MindEase

  # ─────────────────────────────────────────────────────────────────────────────
  # S3 Buckets
  # ─────────────────────────────────────────────────────────────────────────────
  S3PrivateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${TablePrefix}-private-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: MindEase

  S3PublicBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${TablePrefix}-public-${AWS::AccountId}-${AWS::Region}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3000
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: MindEase

  # ─────────────────────────────────────────────────────────────────────────────
  # IAM Roles & Policies for Compute Instances
  # ─────────────────────────────────────────────────────────────────────────────
  AppIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      Path: /
      Policies:
        # DynamoDB access policy
        - PolicyName: DynamoDBAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt DynamoDBMainTable.Arn
                  - !Sub "${DynamoDBMainTable.Arn}/index/*"
        # S3 access policy
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt S3PrivateBucket.Arn
                  - !Sub "${S3PrivateBucket.Arn}/*"
                  - !GetAtt S3PublicBucket.Arn
                  - !Sub "${S3PublicBucket.Arn}/*"
        # Bedrock Converse API access policy
        - PolicyName: BedrockAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-3-haiku-20240307-v1:0"
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0"
                  - "arn:aws:bedrock:*::foundation-model/amazon.titan-text-express-v1"
        # Secrets Manager access policy (for JWT keys)
        - PolicyName: SecretsManagerAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mindease/*"

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref AppIAMRole

Outputs:
  DynamoDBTableName:
    Value: !Ref DynamoDBMainTable
    Description: Name of the DynamoDB table.

  S3PrivateBucketName:
    Value: !Ref S3PrivateBucket
    Description: Name of the private S3 bucket.

  S3PublicBucketName:
    Value: !Ref S3PublicBucket
    Description: Name of the public S3 bucket.

  IAMInstanceProfileName:
    Value: !Ref AppInstanceProfile
    Description: Instance profile to attach to EC2/Elastic Beanstalk.
