version: '3.8'

# Local development compose
# Usage: docker-compose up --build
# Set environment variables in .env files before running

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock-access-key-id}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock-secret-access-key}
      - DYNAMODB_TABLE_PREFIX=${DYNAMODB_TABLE_PREFIX:-mindease}
      - S3_PRIVATE_BUCKET=${S3_PRIVATE_BUCKET:-mindease-private}
      - S3_PUBLIC_BUCKET=${S3_PUBLIC_BUCKET:-mindease-public}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
      - BEDROCK_REGION=${BEDROCK_REGION:-us-east-1}
      - USE_SECRETS_MANAGER=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: mindease-network
